# DeepStream Custom Parser Tester — Parser Plugin Configuration
#
# parser_so   : Path to the compiled parser shared library (.so).
#               May be absolute or relative to the working directory.
#               Example: /home/user/myproject/build/libmy_parser.so
#
# parser_func : C-linkage function name exported by the .so.
#               The function MUST have the following signature:
#
#   extern "C" bool <func_name>(
#       const std::vector<NvDsInferLayerInfo>&   outputLayersInfo,
#       const NvDsInferNetworkInfo&              networkInfo,
#       const NvDsInferParseDetectionParams&     detectionParams,
#       std::vector<NvDsInferInstanceMaskInfo>&  objectList
#   );
#
# The struct types above are defined in include/fake_nvdsinfer.h (or the real
# DeepStream SDK nvdsinfer.h). Your parser .so must be compiled against the
# same header so that the struct layouts match.
#
# Build your parser .so (example using the bundled reference parser):
#
#   g++ -std=c++11 -shared -fPIC \
#       -I /path/to/DeepStream-Custom-Parser-Tester/include \
#       -o libparser.so \
#       /path/to/DeepStream-Custom-Parser-Tester/parser/yolo26_parser.cpp
#
# Then update the two lines below and run parser_tester:
#
#   ./parser_tester --image test.jpg --model model.onnx \
#                   --config ../config/parser.conf
#
# Lines starting with '#' are comments and are ignored.
# Blank lines are ignored.
# Keys and values are separated by '='. Leading/trailing whitespace is trimmed.

parser_so   = ./libparser.so
parser_func = NvDsInferParseYolo26InstanceMask
